/* ---------- MATH ---------- */
function interpolateDemand(surveyData, price, demandPotential) {
  const sorted = [...surveyData].sort((a,b)=>a.price-b.price);
  const total = sorted.reduce((s,d)=>s+d.responses,0);
  let lo = 0, hi = sorted.length - 1;
  for (let i = 0; i < sorted.length; i++) {
    if (sorted[i].price <= price) lo = i;
    if (sorted[i].price >= price && hi === sorted.length - 1) hi = i;
  }
  if (lo === hi) {
    let cum = 0; for (let i = lo; i < sorted.length; i++) cum += sorted[i].responses;
    return demandPotential * (cum / total);
  }
  const p1 = sorted[lo], p2 = sorted[hi];
  let c1 = 0, c2 = 0;
  for (let i = lo; i < sorted.length; i++) c1 += sorted[i].responses;
  for (let i = hi; i < sorted.length; i++) c2 += sorted[i].responses;
  const f1 = c1/total, f2 = c2/total;
  const t = (price - p1.price) / (p2.price - p1.price);
  return demandPotential * (f1 + t * (f2 - f1));
}

function profitCurve(data, costs, period) {
  const min = Math.min(...data.map(d=>d.price));
  const max = Math.max(...data.map(d=>d.price));
  const step = (max-min)/60;
  const D0 = costs.D * DEMAND_MULT[period];
  const out = [];
  for (let p = min; p <= max; p += step) {
    const dem = interpolateDemand(data, p, D0);
    const rev = p * dem;
    const vc = costs.VC * dem;
    const prof = rev - vc - costs.FC;
    out.push({
      price: Math.round(p*100)/100,
      demand: Math.round(dem),
      revenue: Math.round(rev),
      profit: Math.round(prof)
    });
  }
  return out;
}

const findPeak = curve => curve.reduce((m,c)=>c.profit>m.profit?c:m, curve[0]);

function wtpCumulative(data) {
  const sorted = [...data].sort((a,b)=>a.price-b.price);
  const total = sorted.reduce((s,d)=>s+d.responses,0);
  let cum = 0;
  return sorted.map(d => {
    cum += d.responses;
    return { price: d.price, responses: d.responses, pct: d.responses/total*100, pctAcceptAtOrAbove: (total - cum + d.responses)/total*100 };
  });
}

/* Prospect-theory value function */
function prospectValue(x, alpha=0.88, lambda=2.25) {
  return x >= 0 ? Math.pow(x, alpha) : -lambda * Math.pow(-x, alpha);
}

/* ---------- SMALL COMPONENTS ---------- */
function Pill({ active, onClick, children, color='blue' }) {

}

function KPI({ label, value, color }) {

}

}

/* ---------- APP ---------- */
function App() {
  const [period, setPeriod] = useState('day');

  const updateCompetitor = (comp, ver, val) => {
    setCompetitors(prev => ({ ...prev, [period]: { ...prev[period], [comp]: { ...prev[period][comp], [ver]: parseFloat(val)||0 } } }));

  /* Nomade vs competitor-average gap (used to compute positioning) */
  const avgCompStd  = COMP_META.reduce((s,c)=>s+competitors[period][c.k].standard,0) / COMP_META.length;
  const avgCompPrem = COMP_META.reduce((s,c)=>s+competitors[period][c.k].premium,0) / COMP_META.length;
  const gapStd  = ourPrices[period].standard - avgCompStd;
  const gapPrem = ourPrices[period].premium  - avgCompPrem;

    const total = data.reduce((s,d)=>s+d.responses,0);
    const accept = data.filter(d => d.price >= p).reduce((s,d)=>s+d.responses,0);
    return (accept/total)*100;

  /* ---------- Chart builders ---------- */

      { name: 'Basic', price: anchorTier.basic, label: 'loss in quality' },
      { name: 'Middle (target)', price: anchorTier.mid, label: 'sandwich — preferred' },
      { name: 'Premium anchor', price: anchorTier.premium, label: 'loss in cost' }
    ];
    return (
      <ResponsiveContainer width="100%" height={280}>
        <BarChart data={data}>
          <CartesianGrid strokeDasharray="3 3" />
          <XAxis dataKey="name" />
          <YAxis label={{ value:'Price (€)', angle:-90, position:'insideLeft' }} />
          <Tooltip formatter={v => `€${v}`} />
          <Bar dataKey="price">
            <Cell fill="#94a3b8" />
            <Cell fill="#059669" />
            <Cell fill="#dc2626" />
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
  };

  const CharmChart = () => {
    /* Simulates what share of WTP responses will 'feel' each price is affordable.
       Charm pricing narrative: €79 perceived closer to €70 than €80 by digit-left effect. */
    const left1 = Math.floor(charmTest.round/10);
    const left2 = Math.floor(charmTest.charm/10);
    const demandRound = interpolateDemand(curSurvey, charmTest.round, curCosts.D * DEMAND_MULT[period]);
    /* apply a 'perception boost' when left digit drops */
    const boost = left2 < left1 ? 1.07 : 1.0;
    const demandCharm = interpolateDemand(curSurvey, charmTest.charm, curCosts.D * DEMAND_MULT[period]) * boost;
    const data = [
      { name: `€${charmTest.round} (round)`, demand: Math.round(demandRound),  profit: Math.round(demandRound * (charmTest.round - curCosts.VC) - curCosts.FC) },
      { name: `€${charmTest.charm} (charm)`, demand: Math.round(demandCharm),  profit: Math.round(demandCharm * (charmTest.charm - curCosts.VC) - curCosts.FC) }
    ];
    return (
      <ResponsiveContainer width="100%" height={260}>
        <BarChart data={data}>
          <CartesianGrid strokeDasharray="3 3" />
          <XAxis dataKey="name" />
          <YAxis yAxisId="l" />
          <YAxis yAxisId="r" orientation="right" />
          <Tooltip formatter={v => Number(v).toLocaleString()} />
          <Legend />
          <Bar yAxisId="l" dataKey="demand" name="Expected demand" fill="#2563eb" />
          <Bar yAxisId="r" dataKey="profit" name="Profit (€)" fill="#f97316" />
        </BarChart>
      </ResponsiveContainer>
    );
  };

  const ProspectChart = () => {
    const pts = [];
    for (let x = -50; x <= 50; x += 2) pts.push({ gainLoss: x, value: Math.round(prospectValue(x)*100)/100 });
    return (
      <ResponsiveContainer width="100%" height={280}>
        <LineChart data={pts}>
          <CartesianGrid strokeDasharray="3 3" />
          <XAxis dataKey="gainLoss" label={{ value:'Gain/Loss (€)', position:'insideBottom', offset:-5 }} />
          <YAxis label={{ value:'Perceived value', angle:-90, position:'insideLeft' }} />
          <ReferenceLine x={0} stroke="#0f172a" />
          <ReferenceLine y={0} stroke="#0f172a" />
          <Tooltip />
          <Line type="monotone" dataKey="value" stroke="#7c3aed" strokeWidth={3} dot={false} name="v(x) = x^α / −λ(−x)^α" />
        </LineChart>
      </ResponsiveContainer>
    );
  };

  const ReferenceChart = () => {
    /* How respondents' WTP compares to a reference price */
    const below = curSurvey.filter(d => d.price <  refPrice).reduce((s,d)=>s+d.responses,0);
    const at    = curSurvey.filter(d => d.price === refPrice).reduce((s,d)=>s+d.responses,0);
    const above = curSurvey.filter(d => d.price >  refPrice).reduce((s,d)=>s+d.responses,0);
    const data = [
      { name: `Below €${refPrice}`, value: below, fill:'#dc2626' },
      { name: `At €${refPrice}`,    value: at,    fill:'#f59e0b' },
      { name: `Above €${refPrice}`, value: above, fill:'#059669' }
    ];
    return (
      <ResponsiveContainer width="100%" height={260}>
        <BarChart data={data}>
          <CartesianGrid strokeDasharray="3 3" />
          <XAxis dataKey="name" />
          <YAxis />
          <Tooltip />
          <Bar dataKey="value">
            {data.map((d,i)=><Cell key={i} fill={d.fill} />)}
          </Bar>
        </BarChart>
      </ResponsiveContainer>
    );
  };

  /* ---------- Download handlers ---------- */
  const now = new Date().toISOString();
  const position = {
    generatedAt: now,
    period,
    version,
    ourPrices,
    competitors,
    peakStandard: { price: peakStd.price, demand: peakStd.demand, revenue: peakStd.revenue, profit: peakStd.profit },
    peakPremium:  { price: peakPrem.price, demand: peakPrem.demand, revenue: peakPrem.revenue, profit: peakPrem.profit },
    gapVsAverage: { standard: Math.round(gapStd*100)/100, premium: Math.round(gapPrem*100)/100 },
    wtpAcceptance: { standard: Math.round(pctAcceptStd*100)/100 + '%', premium: Math.round(pctAcceptPrem*100)/100 + '%' },
    psychologicalFactorsUsed: {
      anchoring: anchorTier,
      charmPricing: charmTest,
      referencePrice: refPrice
    },
    analystNote: positionNote
  };

  const downloadJSON = () => {
    const payload = {
      questionnaire: QUESTIONS,
      surveyAggregates: SURVEY,
      simulatorPosition: position
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nomade-simulator-${period}-${version}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const downloadCSV = () => {
    const rows = [];
    rows.push(['SECTION','Questions']);
    rows.push(['Question ID','Question text']);
    QUESTIONS.forEach(q => rows.push([q.id, q.text]));
    rows.push([]);
    rows.push(['SECTION','Survey aggregates']);
    rows.push(['Period','Version','Price (€)','Responses']);
    for (const p of ['day','weekend','week']) {
      for (const v of ['standard','premium']) {
        for (const r of SURVEY[p][v]) rows.push([p, v, r.price, r.responses]);
      }
    }
    rows.push([]);
    rows.push(['SECTION','Simulator position']);
    rows.push(['Field','Value']);
    rows.push(['Generated at', now]);
    rows.push(['Active period', period]);
    rows.push(['Active version', version]);
    for (const p of ['day','weekend','week']) {
      rows.push([`Our ${p} standard (€)`, ourPrices[p].standard]);
      rows.push([`Our ${p} premium (€)`,  ourPrices[p].premium]);
      for (const c of COMP_META) {
        rows.push([`${c.name} ${p} standard (€)`, competitors[p][c.k].standard]);
        rows.push([`${c.name} ${p} premium (€)`,  competitors[p][c.k].premium]);
      }
    }
    rows.push(['Peak profit price — standard (€)', peakStd.price]);
    rows.push(['Peak profit — standard (€)', peakStd.profit]);
    rows.push(['Peak profit price — premium  (€)', peakPrem.price]);
    rows.push(['Peak profit — premium  (€)', peakPrem.profit]);
    rows.push(['Gap vs avg competitor — standard (€)', Math.round(gapStd*100)/100]);
    rows.push(['Gap vs avg competitor — premium  (€)', Math.round(gapPrem*100)/100]);
    rows.push(['WTP acceptance — standard (%)', Math.round(pctAcceptStd*100)/100]);
    rows.push(['WTP acceptance — premium  (%)', Math.round(pctAcceptPrem*100)/100]);
    rows.push(['Anchoring — basic',   anchorTier.basic]);
    rows.push(['Anchoring — middle',  anchorTier.mid]);
    rows.push(['Anchoring — premium', anchorTier.premium]);
    rows.push(['Charm pricing — round price', charmTest.round]);
    rows.push(['Charm pricing — charm price', charmTest.charm]);
    rows.push(['Reference price',     refPrice]);
    rows.push(['Analyst note',        (positionNote||'').replace(/"/g,'""')]);

    const csv = rows.map(r => r.map(c => {
      const s = c===undefined||c===null ? '' : String(c);
      return /[",\n;]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(',')).join('\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `nomade-simulator-${period}-${version}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  /* ---------- Graph catalog (for the dynamic picker) ---------- */
  const OVERVIEW_GRAPHS = [
    { k:'wtp',         label:'WTP distribution',       group:'overview' },
    { k:'profit',      label:'Profit curve',           group:'overview' },
    { k:'demand',      label:'Demand + Revenue',       group:'overview' },
    { k:'competitive', label:'Competitive positioning',group:'overview' },
    { k:'gap',         label:'Gap vs competitors',     group:'overview' }
  ];
  const PSYCH_GRAPHS = [
    { k:'anchor',    label:'Anchoring / Sandwich',   group:'psych' },
    { k:'charm',     label:'Charm pricing (digit 9)',group:'psych' },
    { k:'prospect',  label:'Prospect Theory',        group:'psych' },
    { k:'reference', label:'Reference price',        group:'psych' }
  ];

  const GraphBlock = ({k}) => {
    const titles = {
      wtp:'WTP distribution & cumulative acceptance',
      profit:'Profit curve',
      demand:'Demand + Revenue',
      competitive:'Competitive positioning',
      gap:'Gap vs competitors',
      anchor:'Good-Better-Best (Anchoring)',
      charm:'Charm pricing (round vs digit-9)',
      prospect:'Prospect Theory value function',
      reference:'Reference price — respondents around threshold'
    };
    const C = {
      wtp:<WTPChart/>, profit:<ProfitChart/>, demand:<DemandChart/>,
      competitive:<CompetitiveChart/>, gap:<GapChart/>,
      anchor:<AnchorChart/>, charm:<CharmChart/>, prospect:<ProspectChart/>, reference:<ReferenceChart/>
    }[k];
    return (
      <div className="card" key={k}>
        <h3>{titles[k]}</h3>
        {C}
      </div>
    );
  };

  /* ---------- Render ---------- */
  return (
    <div className="wrap">
      <div className="hero">
        <h1>Nomade Vans — Pricing Simulator</h1>
        <p>WTP • Competition-based pricing • Psychological factors — interactive, shareable, exportable.</p>
      </div>

      {/* Master controls */}
      <div className="card">
        <div className="grid-2">
          <div>
            <label>Rental period</label>
            <div className="row">
              {PERIODS.map(p =>
                <Pill key={p.k} active={period===p.k} onClick={()=>setPeriod(p.k)}>{p.label}</Pill>
              )}
            </div>
          </div>
          <div>
            <label>Version</label>
            <div className="row">
              <Pill active={version==='standard'} onClick={()=>setVersion('standard')}>Standard</Pill>
              <Pill active={version==='premium'}  onClick={()=>setVersion('premium')}>Premium</Pill>
            </div>
          </div>
        </div>

        <div className="grid-4" style={{marginTop:14}}>
          <KPI label="Std peak price"  value={`€${peakStd.price}`}  color="blue" />
          <KPI label="Prem peak price" value={`€${peakPrem.price}`} color="orange" />
          <KPI label="Our std price"   value={`€${ourPrices[period].standard}`} />
          <KPI label="Our prem price"  value={`€${ourPrices[period].premium}`} />
        </div>
        <div className="grid-4" style={{marginTop:10}}>
          <KPI label="Acceptance % — std"  value={`${pctAcceptStd.toFixed(1)}%`}  color={pctAcceptStd>50?'green':'red'} />
          <KPI label="Acceptance % — prem" value={`${pctAcceptPrem.toFixed(1)}%`} color={pctAcceptPrem>50?'green':'red'} />
          <KPI label="Gap vs avg (std)"    value={`${gapStd>=0?'+':''}€${gapStd.toFixed(1)}`}  color={gapStd>0?'red':'green'} />
          <KPI label="Gap vs avg (prem)"   value={`${gapPrem>=0?'+':''}€${gapPrem.toFixed(1)}`} color={gapPrem>0?'red':'green'} />
        </div>
      </div>

      {/* Tabs */}
      <div className="tab-row">
        <button className={`tab ${tab==='overview'?'active':''}`}   onClick={()=>setTab('overview')}>Competition-based</button>
        <button className={`tab ${tab==='psych'?'active':''}`}      onClick={()=>setTab('psych')}>Psychological factors</button>
        <button className={`tab ${tab==='position'?'active':''}`}   onClick={()=>setTab('position')}>Position & prices</button>
        <button className={`tab ${tab==='download'?'active':''}`}   onClick={()=>setTab('download')}>Download Q&amp;A</button>
      </div>

      {/* Tab — Overview / Competition-based */}
      {tab==='overview' && (
        <>
          <div className="card">
            <h2>Graph picker — Competition-based</h2>
            <p className="note">Combine WTP, profitability and competition charts. Tick the graphs you want on the board.</p>
            <GraphPicker options={OVERVIEW_GRAPHS} selected={overviewGraphs} setSelected={setOverviewGraphs} />
          </div>
          {overviewGraphs.map(k => <GraphBlock k={k} key={k} />)}
          <div className="card">
            <h2>Detailed price table</h2>
            <table>
              <thead>
                <tr><th>Company</th><th>Standard (€)</th><th>Premium (€)</th><th>Gap (€)</th></tr>
              </thead>
              <tbody>
                {compData.map((c,i) => (
                  <tr key={i} style={c.isUs ? {background:'#fff7ed', fontWeight:600} : null}>
                    <td><span style={{display:'inline-block', width:10, height:10, borderRadius:10, background:c.color, marginRight:8}}/>{c.name}</td>
                    <td>€{c.standard}</td><td>€{c.premium}</td><td>€{c.premium - c.standard}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Tab — Psychological factors */}
      {tab==='psych' && (
        <>
          <div className="card">
            <h2>Graph picker — Psychological factors</h2>
            <p className="note">Explore presentation issues and fairness heuristics applied to Nomade Vans pricing.</p>
            <GraphPicker options={PSYCH_GRAPHS} selected={psychGraphs} setSelected={setPsychGraphs} />
          </div>

          {psychGraphs.includes('anchor') && (
            <div className="card">
              <h3>Anchoring — Good-Better-Best sandwich</h3>
              <p className="note">Create a three-tier menu. Customers gravitate to the middle option.</p>
              <div className="grid-3">
                <div><label>Basic (€)</label><input type="number" value={anchorTier.basic} onChange={e=>setAnchorTier({...anchorTier, basic:+e.target.value})}/></div>
                <div><label>Middle — target (€)</label><input type="number" value={anchorTier.mid} onChange={e=>setAnchorTier({...anchorTier, mid:+e.target.value})}/></div>
                <div><label>Premium anchor (€)</label><input type="number" value={anchorTier.premium} onChange={e=>setAnchorTier({...anchorTier, premium:+e.target.value})}/></div>
              </div>
              <div style={{marginTop:12}}><AnchorChart /></div>
            </div>
          )}

          {psychGraphs.includes('charm') && (
            <div className="card">
              <h3>Charm pricing — digit-9 effect</h3>
              <p className="note">Compare a round price vs a charm price (e.g. €80 vs €79). The simulator applies a 7% perception uplift when the left digit drops.</p>
              <div className="grid-2">
                <div><label>Round price (€)</label><input type="number" value={charmTest.round} onChange={e=>setCharmTest({...charmTest, round:+e.target.value})}/></div>
                <div><label>Charm price (€)</label><input type="number" value={charmTest.charm} onChange={e=>setCharmTest({...charmTest, charm:+e.target.value})}/></div>
              </div>
              <div style={{marginTop:12}}><CharmChart /></div>
            </div>
          )}

          {psychGraphs.includes('prospect') && (
            <div className="card">
              <h3>Prospect Theory — losses weigh more than gains</h3>
              <p className="note">v(x) = x<sup>0.88</sup> on gains and −2.25·(−x)<sup>0.88</sup> on losses. A price hike of €10 hurts much more than a discount of €10 pleases.</p>
              <ProspectChart />
            </div>
          )}

          {psychGraphs.includes('reference') && (
            <div className="card">
              <h3>Reference price</h3>
              <p className="note">Set a reference price (e.g. the cheapest competitor or the previous market rate). See how many survey respondents fall below / at / above it.</p>
              <div style={{maxWidth:240}}>
                <label>Reference price (€)</label>
                <input type="number" value={refPrice} onChange={e=>setRefPrice(+e.target.value)} />
              </div>
              <div style={{marginTop:12}}><ReferenceChart /></div>
            </div>
          )}
        </>
      )}

      {/* Tab — Position & prices */}
      {tab==='position' && (
        <>
          <div className="card">
            <h2>Our position — Nomade Vans</h2>
            <p className="note">These values are saved with the download so you can compare your positioning across sessions.</p>
            <div className="grid-3">
              {PERIODS.map(p => (
                <div key={p.k} className="box-soft">
                  <h3>{p.label}</h3>
                  <label>Standard (€)</label>
                  <input type="number" value={ourPrices[p.k].standard} onChange={e=>setOurPrices(prev=>({...prev,[p.k]:{...prev[p.k],standard:+e.target.value}}))}/>
                  <label style={{marginTop:8}}>Premium (€)</label>
                  <input type="number" value={ourPrices[p.k].premium} onChange={e=>setOurPrices(prev=>({...prev,[p.k]:{...prev[p.k],premium:+e.target.value}}))}/>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <h2>Competitor prices — {PERIODS.find(p=>p.k===period).label}</h2>
            <div className="grid-3">
              {COMP_META.map(c => (
                <div key={c.k} className="box-soft" style={{borderColor:c.color}}>
                  <h3 style={{color:c.color}}>{c.name}</h3>
                  <label>Standard (€)</label>
                  <input type="number" value={competitors[period][c.k].standard} onChange={e=>updateCompetitor(c.k,'standard',e.target.value)}/>
                  <label style={{marginTop:8}}>Premium (€)</label>
                  <input type="number" value={competitors[period][c.k].premium} onChange={e=>updateCompetitor(c.k,'premium',e.target.value)}/>
                </div>
              ))}
            </div>
          </div>

          <div className="card">
            <h2>Analyst note</h2>
            <p className="note">Free text (reasoning, assumptions, stakeholder etc.) — it travels in the download.</p>
            <textarea rows="4" style={{width:'100%', padding:10, border:'1px solid var(--c-border)', borderRadius:8, fontFamily:'inherit'}}
              value={positionNote} onChange={e=>setPositionNote(e.target.value)}
              placeholder="e.g. We chose to sit €5 under People Camper to open the weekend segment..."/>
          </div>
        </>
      )}

      {/* Tab — Download */}
      {tab==='download' && (
        <div className="card">
          <h2>Download questionnaire &amp; position</h2>
          <p className="note">
            Exports the questions asked in the survey, the aggregated answers by price point, and the full position you set
            in the simulator (prices, competitor assumptions, peak profit points, psychological parameters and analyst note).
          </p>

          <div className="grid-2">
            <div className="box-soft">
              <h3>What is included</h3>
              <ul>
                <li>13 survey questions (gender, demographics, 6 WTP questions)</li>
                <li>Aggregated WTP distribution for day / weekend / week, standard &amp; premium</li>
                <li>Your position: Nomade prices + competitor prices, for all periods</li>
                <li>Peak-profit prices, gap vs competitor average, WTP acceptance rate</li>
                <li>Psychological parameters (anchoring tiers, charm test, reference price)</li>
                <li>Analyst free-text note</li>
              </ul>
            </div>
            <div className="box-soft">
              <h3>Formats</h3>
              <p className="note">JSON keeps the full structure; CSV is flat and opens in Excel.</p>
              <div className="row">
                <button className="btn primary" onClick={downloadJSON}>Download JSON</button>
                <button className="btn orange"  onClick={downloadCSV}>Download CSV</button>
              </div>
              <p className="hint">Filename includes the active period &amp; version.</p>
            </div>
          </div>

          <div style={{marginTop:16}}>
            <h3>Preview — position snapshot</h3>
            <pre style={{background:'#0f172a', color:'#e2e8f0', padding:14, borderRadius:10, overflow:'auto', fontSize:'.82rem'}}>
{JSON.stringify(position, null, 2)}
            </pre>
          </div>
        </div>
      )}

      <div className="footer">© César Moreno Pascual PhD — Nomade Vans pricing simulator • Built with React + Recharts</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
