/* ============================================================
   MATH
   ============================================================ */
function interpolateDemand(surveyData, price, demandPotential) {
  const sorted = [...surveyData].sort((a,b)=>a.price-b.price);
  const total = sorted.reduce((s,d)=>s+d.responses,0);
  let lo = 0, hi = sorted.length - 1;
  for (let i = 0; i < sorted.length; i++) {
    if (sorted[i].price <= price) lo = i;
    if (sorted[i].price >= price && hi === sorted.length - 1) hi = i;
  }
  if (lo === hi) {
    let cum = 0; for (let i = lo; i < sorted.length; i++) cum += sorted[i].responses;
    return demandPotential * (cum / total);
  }
  const p1 = sorted[lo], p2 = sorted[hi];
  let c1 = 0, c2 = 0;
  for (let i = lo; i < sorted.length; i++) c1 += sorted[i].responses;
  for (let i = hi; i < sorted.length; i++) c2 += sorted[i].responses;
  const f1 = c1/total, f2 = c2/total;
  const t = (price - p1.price) / (p2.price - p1.price);
  return demandPotential * (f1 + t * (f2 - f1));
}

function profitCurve(data, costs, period) {
  const min = Math.min(...data.map(d=>d.price));
  const max = Math.max(...data.map(d=>d.price));
  const step = (max-min)/60;
  const D0 = costs.D * DEMAND_MULT[period];
  const out = [];
  for (let p = min; p <= max; p += step) {
    const dem = interpolateDemand(data, p, D0);
    const rev = p * dem;
    const vc = costs.VC * dem;
    const prof = rev - vc - costs.FC;
    out.push({ price: Math.round(p*100)/100, demand: Math.round(dem), revenue: Math.round(rev), profit: Math.round(prof) });
  }
  return out;
}
const findPeak = curve => curve.reduce((m,c)=>c.profit>m.profit?c:m, curve[0]);

function wtpCumulative(data) {
  const sorted = [...data].sort((a,b)=>a.price-b.price);
  const total = sorted.reduce((s,d)=>s+d.responses,0);
  let cum = 0;
  return sorted.map(d => {
    cum += d.responses;
    return { price: d.price, responses: d.responses, pctAbove: (total - cum + d.responses)/total*100 };
  });
}

const prospectValue = (x, a=0.88, l=2.25) => x >= 0 ? Math.pow(x,a) : -l*Math.pow(-x,a);

function pctAccepting(data, p) {
  const total = data.reduce((s,d)=>s+d.responses,0);
  const accept = data.filter(d => d.price >= p).reduce((s,d)=>s+d.responses,0);
  return (accept/total)*100;
}

  }, [period, version, psychSynced]);

  /* Live metrics at the current "Our price" for the active version */
  const live = useMemo(() => {
    const ourP = ourPrices[period][version];
    const D0 = COSTS[version].D * DEMAND_MULT[period];
    const d = interpolateDemand(SURVEY[period][version], ourP, D0);
    const rev = ourP * d;
    const vc  = COSTS[version].VC * d;
    const prof = rev - vc - COSTS[version].FC;
    const peak = version === 'standard' ? peakStd : peakPrem;
    return {
      price: ourP,
      demand: Math.round(d),
      revenue: Math.round(rev),
      profit: Math.round(prof),
      lostVsPeak: Math.round(peak.profit - prof),
      peakPrice: peak.price
    };
  }, [ourPrices, period, version, peakStd, peakPrem]);

  /* ---------- Chart components (accept w,h so the offscreen copy can render fixed-size) ---------- */
  const wtpData = useMemo(() => {
    const cum = wtpCumulative(curSurvey);
    return curSurvey.map(d => ({ ...d, pctAbove: (cum.find(c=>c.price===d.price)||{}).pctAbove || 0 }));

  const ProfitChart = ({h=380, w="100%", interactive=false}) => {
    const [dragging, setDragging] = useState(false);

      if (!interactive) return;

      window.addEventListener('mouseup', up);
      return () => window.removeEventListener('mouseup', up);
    }, [interactive]);
    const snap = (val) => {
      /* snap to nearest curve x to avoid jitter */
      let best = curCurve[0].price, dmin = Infinity;
      for (const p of curCurve) { const d = Math.abs(p.price - val); if (d < dmin) { dmin = d; best = p.price; } }
      return best;
    };
    const move = (e, forceStart=false) => {
      if (!interactive) return;
      if (e && e.activeLabel != null) {
        const v = snap(e.activeLabel);
        if (forceStart || dragging) {
          setOurPrices(prev => ({ ...prev, [period]: { ...prev[period], [version]: v } }));
        }
      }
    };
    return (
      <ResponsiveContainer width={w} height={h}>
        <LineChart data={curCurve}
          onMouseDown={(e) => { if (interactive && e?.activeLabel != null) { setDragging(true); move(e, true); } }}

          <CartesianGrid strokeDasharray="3 3" />

            <ReferenceLine key={c.k} x={competitors[period][c.k][version]} stroke={c.color} strokeDasharray="3 3"

          <Line type="monotone" dataKey="profit" stroke={version==='standard' ? '#3b82f6' : '#f97316'} strokeWidth={3} dot={false} name={version==='standard'?'Standard profit':'Premium profit'} isAnimationActive={false} />

  const DemandChart = ({h=300, w="100%"}) => (

  const CharmChart = ({h=260, w="100%"}) => {
    const left1 = Math.floor(charmTest.round/10);

    const demandCharm = interpolateDemand(curSurvey, charmTest.charm, curCosts.D * DEMAND_MULT[period]) * boost;
    const data = [

  const ProspectChart = ({h=280, w="100%"}) => {
    const delta = prospectFromTo.to - prospectFromTo.from; /* €, from customer's viewpoint: +ve = discount, -ve = hike */
    const customerChange = -delta; /* customer's "gain" (discount) or "loss" (hike) vs reference */
    const xMax = Math.max(50, Math.ceil(Math.abs(customerChange) * 1.2));
    const pts = [];
    for (let x = -xMax; x <= xMax; x += Math.max(1, Math.round(xMax/30))) pts.push({ gainLoss: x, value: Math.round(prospectValue(x)*100)/100 });
    const vChange = prospectValue(customerChange);
    const vEqualGain = customerChange < 0 ? Math.abs(vChange) : null; /* how big a gain we'd need to offset */
    return (
      <ResponsiveContainer width={w} height={h}>
        <LineChart data={pts}>
          <CartesianGrid strokeDasharray="3 3" />
          <XAxis dataKey="gainLoss" type="number" domain={[-xMax, xMax]} label={{ value:'Customer gain (+) or loss (−) vs reference (€)', position:'insideBottom', offset:-4, fontSize:11 }} />
          <YAxis label={{ value:'Perceived value', angle:-90, position:'insideLeft', fontSize:11 }} />
          <ReferenceLine x={0} stroke="#0f172a" /><ReferenceLine y={0} stroke="#0f172a" />

  };

  const ReferenceChart = ({h=260, w="100%"}) => {
    const below = curSurvey.filter(d => d.price <  refPrice).reduce((s,d)=>s+d.responses,0);
    const at    = curSurvey.filter(d => d.price === refPrice).reduce((s,d)=>s+d.responses,0);
    const above = curSurvey.filter(d => d.price >  refPrice).reduce((s,d)=>s+d.responses,0);
    const data = [
      { name: `Below €${refPrice}`, value: below, fill:'#dc2626' },
      { name: `At €${refPrice}`,    value: at,    fill:'#f59e0b' },

    return (
      <ResponsiveContainer width={w} height={h}>
        <BarChart data={data}>

  const CHART_CATALOG = [
    { k:'wtp',         label:'WTP distribution',        C: WTPChart,         group:'overview' },
    { k:'profit',      label:'Profit curve',            C: ProfitChart,      group:'overview' },

    { k:'competitive', label:'Competitive positioning', C: CompetitiveChart, group:'overview' },
    { k:'gap',         label:'Gap vs competitors',      C: GapChart,         group:'overview' },
    { k:'anchor',      label:'Anchoring / Sandwich',    C: AnchorChart,      group:'psych' },
    { k:'charm',       label:'Charm pricing (digit 9)', C: CharmChart,       group:'psych' },
    { k:'prospect',    label:'Prospect Theory',         C: ProspectChart,    group:'psych' },

  /* ============================================================
     Export — SVG → PNG → Excel
     ============================================================ */
  const svgToPngDataUrl = async (svgEl, scale = 2) => {
    const clone = svgEl.cloneNode(true);
    const w = svgEl.clientWidth  || svgEl.getBoundingClientRect().width  || 860;
    const h = svgEl.clientHeight || svgEl.getBoundingClientRect().height || 380;
    clone.setAttribute('width',  w);
    clone.setAttribute('height', h);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    const xml = new XMLSerializer().serializeToString(clone);
    const b64 = btoa(unescape(encodeURIComponent(xml)));
    const img = new Image();
    img.src = 'data:image/svg+xml;base64,' + b64;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    const canvas = document.createElement('canvas');
    canvas.width  = w * scale;
    canvas.height = h * scale;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0, w, h);
    return canvas.toDataURL('image/png');
  };

  const buildExcel = async () => {
    setDownloading(true);
    setDownloadStatus({kind:'info', text:'Rendering charts…'});
    await new Promise(r => setTimeout(r, 60));
    try {
      const images = {};
      for (const c of CHART_CATALOG) {
        const host = document.getElementById('cap-' + c.k);
        if (!host) continue;
        const svg = host.querySelector('svg');
        if (!svg) continue;
        try { images[c.k] = await svgToPngDataUrl(svg, 2); } catch (e) { console.warn('skip', c.k, e); }
      }

      setDownloadStatus({kind:'info', text:'Building workbook…'});
      const wb = new ExcelJS.Workbook();
      wb.creator = 'Nomade Vans pricing simulator';
      wb.created = new Date();

      /* Sheet 1: Guide */
      const s1 = wb.addWorksheet('Guide');
      s1.columns = [{ width: 26 }, { width: 90 }];
      const g = [
        ['Nomade Vans — Pricing Simulator', ''],
        ['Generated at', new Date().toISOString()],
        ['', ''],
        ['Case background', ''],
        ['Company',          'Nomade Vans — Spanish start-up designing sustainable camperised vans. Two service tiers: Standard and Premium. New line of business under evaluation: van rental.'],
        ['Rental periods',   'Day · Weekend (2 nights) · Week (6 nights).'],
        ['Survey',           '95 respondents — demographics, travel habits and max WTP in 6 rental scenarios.'],
        ['Competitors',      'Further VAN experience · People Camper · Ocean Vans — daily tariffs only.'],
        ['', ''],
        ['⚠ Data note', ''],
        ['Incomplete dataset', 'The three competitors publish DAILY tariffs only. The weekend and weekly prices in the simulator are ESTIMATES aggregated from the daily tariff (weekend ≈ −5 % per day, week ≈ −30 % per day). Treat them as reference scenarios, not observed data. Nomade WTP data itself is real (95 respondents).'],
        ['', ''],
        ['How to read this file', ''],
        ['Guide',               'This sheet — case background, data note and active view.'],
        ['Questions',           'The 13 questions asked to the 95 survey respondents (reference only, not a student task).'],
        ['Answers — Day',       'Aggregated answers to the "day" WTP questions (Standard & Premium).'],
        ['Answers — Weekend',   'Same for the weekend rate (derived from the daily WTP via scaling).'],
        ['Answers — Week',      'Same for the weekly rate (derived from the daily WTP via scaling).'],
        ['Position',            'The prices you set in the simulator and the resulting KPIs.'],
        ['Case answers',        'Your written answers to the three formal case questions.'],
        ['Charts',              'All 9 charts from the simulator, embedded as images.'],
        ['', ''],
        ['Your active view when downloading', ''],
        ['Period',              period],
        ['Version',             version],
        ['Our standard price (€)', ourPrices[period].standard],
        ['Our premium price (€)',  ourPrices[period].premium],
        ['Analyst note',        positionNote || '(none)']
      ];
      g.forEach((r,i) => {
        const row = s1.addRow(r);
        if (i === 0) row.font = { bold: true, size: 14 };
        if (['Case background','⚠ Data note','How to read this file','Your active view when downloading'].includes(r[0])) row.font = { bold: true };

      });

      /* Sheet 2: Questions */
      const s2 = wb.addWorksheet('Questions');
      s2.columns = [
        { header: 'ID',       key: 'id',      width: 8 },
        { header: 'Question', key: 'text',    width: 60 },
        { header: 'Type',     key: 'type',    width: 20 },
        { header: 'Options / Range', key: 'options', width: 40 }
      ];
      s2.getRow(1).font = { bold: true };
      QUESTIONS.forEach(q => s2.addRow(q));

      /* Sheets 3–5: Answers per period */
      for (const p of PERIODS) {
        const shortLabel = p.label.split(' ')[0];
        const s = wb.addWorksheet('Answers — ' + shortLabel);
        s.columns = [
          { header: 'Period',    key:'period',    width: 10 },
          { header: 'Version',   key:'version',   width: 12 },
          { header: 'Price (€)', key:'price',     width: 10 },
          { header: 'Responses', key:'responses', width: 10 },
          { header: '% of respondents', key:'pct', width: 18 },
          { header: 'Cum. % accepting ≥ price', key:'pctAbove', width: 28 }
        ];
        s.getRow(1).font = { bold: true };
        for (const v of ['standard','premium']) {
          const cum = wtpCumulative(SURVEY[p.k][v]);
          const total = SURVEY[p.k][v].reduce((a,d)=>a+d.responses,0);
          for (const r of SURVEY[p.k][v]) {
            const pAbove = (cum.find(c=>c.price===r.price)||{}).pctAbove || 0;
            s.addRow({
              period: p.k, version: v,
              price: r.price, responses: r.responses,
              pct: Math.round(r.responses/total*1000)/10,
              pctAbove: Math.round(pAbove*10)/10

          }

      }

      /* Sheet 6: Position */
      const s6 = wb.addWorksheet('Position');
      s6.columns = [{ width: 40 }, { width: 22 }];

      for (const c of COMP_META) {

        s6.addRow([c.name + ' premium (€)',  competitors[period][c.k].premium]);
      }
      s6.addRow([]);
      s6.addRow(['— KPIs (active view) —']).font = { bold: true };
      s6.addRow(['Active period', period]);
      s6.addRow(['Active version', version]);
      s6.addRow(['Peak profit — standard (price €)', peakStd.price]);

      s6.addRow(['Anchoring — basic (€)',   anchorTier.basic]);

      s6.addRow(['Anchoring — premium (€)', anchorTier.premium]);
      s6.addRow(['Charm — round price (€)', charmTest.round]);
      s6.addRow(['Charm — charm price (€)', charmTest.charm]);
      s6.addRow(['Reference price (€)',     refPrice]);
      s6.addRow([]);
      s6.addRow(['Analyst note', positionNote || '(none)']);

      /* Sheet 6b: Case answers — the three formal questions */
      const sA = wb.addWorksheet('Case answers');
      sA.columns = [{ width: 6 }, { width: 30 }, { width: 90 }];
      const titleRow = sA.addRow(['', 'Nomade Vans — Case deliverables', '']);
      titleRow.getCell(2).font = { bold: true, size: 14 };
      sA.addRow([]);
      for (const q of CASE_QUESTIONS) {
        const hdr = sA.addRow([q.id, q.title, '']);
        hdr.getCell(1).font = { bold: true, color: { argb: 'FFF97316' } };
        hdr.getCell(2).font = { bold: true };
        const prompt = sA.addRow(['', 'Prompt', q.prompt]);
        prompt.getCell(2).font = { italic: true, color: { argb: 'FF64748B' } };
        prompt.getCell(3).alignment = { wrapText: true, vertical: 'top' };
        const hint = sA.addRow(['', 'Simulator tip', q.hint]);
        hint.getCell(2).font = { italic: true, color: { argb: 'FF64748B' } };
        hint.getCell(3).alignment = { wrapText: true, vertical: 'top' };
        const answerText = caseAnswers[q.id.toLowerCase()] || '(no answer yet)';
        const ans = sA.addRow(['', 'Your answer', answerText]);
        ans.getCell(2).font = { bold: true };
        ans.getCell(3).alignment = { wrapText: true, vertical: 'top' };
        ans.height = Math.min(300, Math.max(40, Math.round(answerText.length/80)*18 + 40));
        sA.addRow([]);
      }

      /* Sheet 7: Charts */
      const s7 = wb.addWorksheet('Charts');
      s7.columns = [{ width: 4 }, { width: 110 }];

      let rowCursor = 3;
      for (const c of CHART_CATALOG) {
        const dataUrl = images[c.k];

          tl:  { col: 1, row: rowCursor },

      const buf = await wb.xlsx.writeBuffer();
      const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `nomade-simulator-${period}-${version}-${new Date().toISOString().slice(0,10)}.xlsx`;

      URL.revokeObjectURL(a.href);

      setDownloadStatus({kind:'ok', text:`Downloaded ${a.download}`});
    } catch (err) {
      console.error(err);
      setDownloadStatus({kind:'err', text:'Error: ' + (err.message || err)});
    } finally {

    }
  };

                <div className="explain" style={{borderLeftColor: d>0 ? '#dc2626' : '#059669', background: d>0 ? '#fef2f2' : '#ecfdf5'}}>
                  {d === 0 ? (<>No change — nothing felt.</>) : d > 0 ? (
                    <>You are <strong>raising the price by €{d}</strong>. The customer perceives this as a loss worth ≈ <strong>{Math.abs(customerFelt)}</strong> value units. To offset it you would need a gain of ≈ <strong>€{Math.round(Math.abs(d)*2.25*10)/10}</strong> — or, better, <em>reframe the hike as a removed discount</em>.</>
                  ) : (
                    <>You are <strong>cutting the price by €{Math.abs(d)}</strong>. The customer perceives a gain of ≈ <strong>{customerFelt}</strong> value units. Remember: gains are felt less intensely than losses of the same size.</>
                  )}
                </div>
              );
            })()}
            <div className="row" style={{marginTop:10}}>
              <button className="btn primary" onClick={()=>setOurPrices(prev=>({...prev,[period]:{...prev[period], standard: prospectFromTo.to}}))}>Apply €{prospectFromTo.to} → Our Standard</button>
              <button className="btn orange"  onClick={()=>setOurPrices(prev=>({...prev,[period]:{...prev[period], premium: prospectFromTo.to}}))}>Apply €{prospectFromTo.to} → Our Premium</button>
            </div>
          </div>
        )}

        {psychGraphs.includes('reference') && (
          <div className="card">
            <h3>Reference price</h3>
            <div className="explain orange">
              <strong>Idea:</strong> customers compare our price against a mental benchmark (cheapest competitor, last year's rate, etc.). Set the reference and see how many survey respondents fall <em>below</em>, <em>at</em>, or <em>above</em> it.
              <br/><strong>Default:</strong> cheapest competitor at the active period.
            </div>
            <div className="grid-2">
              <div style={{maxWidth:260}}>
                <label>Reference price (€)</label>
                <input type="number" value={refPrice} onChange={e=>setRefPrice(+e.target.value)} />
              </div>
              <div style={{alignSelf:'end'}}>
                {COMP_META.map(c => (
                  <button key={c.k} className="btn" style={{borderColor:c.color, color:c.color, marginRight:6}}
                    onClick={()=>setRefPrice(competitors[period][c.k][version])}>
                    Use {c.name} €{competitors[period][c.k][version]}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginTop:12}}><ReferenceChart /></div>
            <div className="row" style={{marginTop:10}}>
              <button className="btn primary" onClick={()=>setOurPrices(prev=>({...prev,[period]:{...prev[period], standard: refPrice}}))}>Match reference €{refPrice} → Our Standard</button>
              <button className="btn orange"  onClick={()=>setOurPrices(prev=>({...prev,[period]:{...prev[period], premium: refPrice}}))}>Match reference €{refPrice} → Our Premium</button>
            </div>
          </div>
        )}
      </>)}

      {/* ----- Tab: Position & prices ----- */}
      {tab==='position' && (<>
        <div className="card">
          <h2>Position the price on the chart — {periodLabel} • {version}</h2>
          <div className="explain green">
            <strong>Drag the green line.</strong> Every number input below syncs automatically. Dashed lines = the three competitors at their current price; blue/orange dashed = peak profit for Standard / Premium.
          </div>
          <ProfitChart interactive={true} h={360} />
          <div className="grid-4" style={{marginTop:14}}>
            <KPI label={`Profit at €${live.price}`} value={`€${live.profit.toLocaleString()}`} color={live.profit>=0?'green':'red'} />
            <KPI label="Expected demand" value={`${live.demand.toLocaleString()} rentals`} color="blue" />
            <KPI label="Revenue" value={`€${live.revenue.toLocaleString()}`} color="orange" />
            <KPI label={`Lost vs peak (€${live.peakPrice})`} value={live.lostVsPeak===0 ? '€0 (optimum!)' : `−€${live.lostVsPeak.toLocaleString()}`} color={live.lostVsPeak===0?'green':'red'} />
          </div>
        </div>

        <div className="card">
          <h2>Numeric inputs — all periods</h2>
          <p className="note">These are the prices <strong>you</strong> want to propose. They travel in the Excel export so you can share or compare different scenarios.</p>
          <div className="grid-3">
            {PERIODS.map(p => (
              <div key={p.k} className="box-soft">
                <h3>{p.label}</h3>
                <label>Standard (€)</label>
                <input type="number" value={ourPrices[p.k].standard} onChange={e=>setOurPrices(prev=>({...prev,[p.k]:{...prev[p.k],standard:+e.target.value}}))}/>
                <label style={{marginTop:8}}>Premium (€)</label>
                <input type="number" value={ourPrices[p.k].premium}  onChange={e=>setOurPrices(prev=>({...prev,[p.k]:{...prev[p.k],premium:+e.target.value}}))}/>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <h2>Competitor prices — {periodLabel}</h2>
          <p className="note">Update these if you have fresher intelligence. Everything else (gap, optimal price, etc.) recomputes live.</p>
          <div className="grid-3">
            {COMP_META.map(c => (
              <div key={c.k} className="box-soft" style={{borderColor:c.color}}>
                <h3 style={{color:c.color}}>{c.name}</h3>
                <label>Standard (€)</label>
                <input type="number" value={competitors[period][c.k].standard} onChange={e=>updateCompetitor(c.k,'standard',e.target.value)}/>
                <label style={{marginTop:8}}>Premium (€)</label>
                <input type="number" value={competitors[period][c.k].premium}  onChange={e=>updateCompetitor(c.k,'premium',e.target.value)}/>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <h2>Analyst note</h2>
          <p className="note">Free text — reasoning, assumptions, stakeholder alignment, etc. It ships inside the Excel.</p>
          <textarea rows="4" value={positionNote} onChange={e=>setPositionNote(e.target.value)}
            placeholder="e.g. We chose to sit €5 under People Camper to open the weekend segment."/>
        </div>
      </>)}

      {/* ----- Tab: Case answers ----- */}
      {tab==='answers' && (<>
        <div className="card">
          <h2>Case deliverables — the four formal questions (Nomade v3.0)</h2>
          <div className="explain">
            These are the four formal questions of the Nomade Vans case (v3.0). Write your answer below — everything you type here is saved with your session and <strong>exported to the Excel download</strong> in a dedicated "Case answers" sheet together with your position, competitor prices and every chart.
          </div>
          <p className="note">Use the interactive tabs (Competition-based, Psychological factors, Position &amp; prices) to produce the evidence, then summarise it here.</p>
        </div>

        {CASE_QUESTIONS.map((q, idx) => (
          <div className="card" key={q.id}>
            <h3 style={{color:'#f97316'}}>{q.id} — {q.title}</h3>
            <div className="explain orange"><strong>Prompt:</strong> {q.prompt}</div>
            <div className="explain"><strong>Simulator tip:</strong> {q.hint}</div>
            <label style={{marginTop:8}}>Your answer</label>
            <textarea rows={idx===0 ? 8 : 10}
              value={caseAnswers[q.id.toLowerCase()]}
              onChange={e => setCaseAnswers(prev => ({...prev, [q.id.toLowerCase()]: e.target.value}))}
              placeholder={`Answer ${q.id} here — the text travels into your Excel download.`} />
            <p className="hint">{caseAnswers[q.id.toLowerCase()].length} characters · auto-saved in the session.</p>
          </div>
        ))}

        <div className="card">
          <h3>When you are ready</h3>
          <p className="note">Go to <strong>Download Excel</strong> to get the .xlsx with your answers, position and charts. The file will contain an additional sheet called <em>Case answers</em>.</p>
        </div>
      </>)}

      {/* ----- Tab: Download Excel ----- */}
      {tab==='download' && (
        <div className="card">
          <h2>Download — the Excel file is the whole deliverable</h2>
          <div className="explain green">
            <strong>Submit this file alone.</strong> No Word document or slide deck is required. The <code>.xlsx</code> contains every piece of evidence: case background, questions, aggregated answers, your final position, your written Case answers and all nine charts as images.
          </div>
          <p className="note">
            8 sheets — opens natively in Excel, Numbers, Google Sheets and LibreOffice.
          </p>
          <div className="grid-2">
            <div className="box-soft">
              <h3>What is inside the file — 8 sheets</h3>
              <ul style={{margin:'4px 0 0 18px', padding:0}}>
                <li><strong>Guide</strong> — case background, data note, active view</li>
                <li><strong>Questions</strong> — the 13 survey questions (reference only)</li>
                <li><strong>Answers — Day / Weekend / Week</strong> — aggregated WTP tables</li>
                <li><strong>Position</strong> — your prices, competitors, KPIs, psychological parameters, analyst note</li>
                <li><strong>Case answers</strong> — your written answers to the three formal questions</li>
                <li><strong>Charts</strong> — all 9 simulator charts as embedded images</li>
              </ul>
            </div>
            <div className="box-soft">
              <h3>Before you download</h3>
              <p className="note">Charts in the file reflect the <strong>current state</strong> of the simulator — active period, version, competitor prices, psychological inputs. Pick the view you want first, then click download.</p>
              <button className="btn primary" onClick={buildExcel} disabled={downloading}>
                {downloading ? 'Generating…' : 'Download Excel (.xlsx)'}
              </button>
              {downloadStatus && <div className={`status ${downloadStatus.kind==='err'?'err':downloadStatus.kind==='ok'?'ok':''}`}>{downloadStatus.text}</div>}
            </div>
          </div>
        </div>
      )}

      {/* Offscreen charts — the source for the PNG captures that go into the Excel */}
      <div className="offscreen" aria-hidden="true">
        {CHART_CATALOG.map(c => (
          <div key={c.k} id={'cap-'+c.k} style={{width:860, height:380, background:'#fff', padding:8}}>
            <c.C h={360} w={844} />
          </div>
        ))}
      </div>

      <div className="footer">© César Moreno Pascual PhD — Nomade Vans pricing simulator • Built with React + Recharts + ExcelJS</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
